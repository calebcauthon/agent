# Shared tmux defaults for rooms agents.
# Why this matters: tmux/full-screen TUIs use the terminal alternate screen,
# so normal terminal scrollback is unavailable. Mouse mode lets trackpad/wheel
# scrolling enter tmux copy-mode instead of being sent as Up-arrow keys.

# Force UTF-8/truecolor-capable tmux. This keeps Powerlevel10k / Nerd Font
# glyphs from being measured or rendered poorly inside tmux.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*:U8=1"

set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi
set -g allow-rename off
set -g renumber-windows on

# More natural split bindings for quick ad-hoc panes.
bind | split-window -h
bind - split-window -v

# Reload this file manually with: prefix r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
